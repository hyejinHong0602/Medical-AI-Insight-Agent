name: Daily Medical AI Report

on:
  schedule:
    # 매일 오전 9시 (KST) 실행 = UTC 오전 0시
    - cron: '13 0 * * *'
  workflow_dispatch: # 수동으로도 실행 가능하게 버튼 추가

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install langchain-groq langchain-huggingface langgraph tavily-python python-dotenv requests

    - name: Run Agent
      env:
        # GitHub Secrets에 등록할 변수들
        GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
        EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
        EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        EMAIL_RECEIVER: ${{ secrets.EMAIL_RECEIVER }}
      run: python main.py